# Linux Control Center — Hyprland fixture
# Este archivo es un ejemplo mínimo realista para desarrollo y tests.
# No se aplica al sistema real en fase 1.

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(88c0d0ff)
    col.inactive_border = rgba(4c566aff)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 4
        passes = 2
    }
    drop_shadow = true
    shadow_range = 12
    shadow_color = rgba(00000066)
}

animations {
    enabled = true
    bezier = easeOut, 0.05, 0.9, 0.1, 1.0
    animation = windows, 1, 5, easeOut
    animation = fade, 1, 4, easeOut
    animation = workspaces, 1, 5, easeOut
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}
